<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#818CF8"/>
      <stop offset="45%" stop-color="#6366F1"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="sparkleMain" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="100%" stop-color="#F0EEFF"/>
    </linearGradient>
    <radialGradient id="sheen" cx="30%" cy="22%" r="75%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#FFFFFF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="innerShadow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#1E1B4B" stop-opacity="0.18"/>
    </linearGradient>
    <filter id="softDrop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="14" flood-color="#3730A3" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- Base squircle -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#bg)"/>
  <!-- Bottom gradient depth -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#innerShadow)"/>
  <!-- Glossy top-left sheen -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="url(#sheen)"/>
  <!-- Soft inner rim highlight -->
  <rect x="20" y="20" width="472" height="472" rx="108" fill="none" stroke="#FFFFFF" stroke-opacity="0.16" stroke-width="2"/>

  <!-- Sparkle glyph group -->
  <g filter="url(#softDrop)">
    <!-- Primary 4-point sparkle, centered slightly low-left of true center -->
    <path
      d="M 246 118
         C 250 176, 258 210, 276 228
         C 294 246, 328 254, 386 258
         C 328 262, 294 270, 276 288
         C 258 306, 250 340, 246 398
         C 242 340, 234 306, 216 288
         C 198 270, 164 262, 106 258
         C 164 254, 198 246, 216 228
         C 234 210, 242 176, 246 118 Z"
      fill="url(#sparkleMain)"
    />
    <!-- Secondary small sparkle, upper right -->
    <path
      d="M 374 96
         C 376 122, 380 138, 388 146
         C 396 154, 412 158, 438 160
         C 412 162, 396 166, 388 174
         C 380 182, 376 198, 374 224
         C 372 198, 368 182, 360 174
         C 352 166, 336 162, 310 160
         C 336 158, 352 154, 360 146
         C 368 138, 372 122, 374 96 Z"
      fill="url(#sparkleMain)"
      opacity="0.92"
    />
  </g>
</svg>
